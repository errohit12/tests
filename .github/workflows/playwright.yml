name: Playwright Tests

on:
  push: {}
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # =====================
      # TEST CASE 1
      # =====================
      - name: Run TestCase1
        run: |
          npx playwright test TestCase1.spec.ts --workers=1
        env:
          PLAYWRIGHT_HTML_REPORT: reports/test1

      # =====================
      # TEST CASE 2 (5 TIMES)
      # =====================
      - name: Run TestCase2 (5 times)
        run: |
          npx playwright test TestCase2.spec.ts --repeat-each=5 --workers=1
        env:
          PLAYWRIGHT_HTML_REPORT: reports/test2

      # =====================
      # TEST CASE 3
      # =====================
      - name: Run TestCase3
        run: |
          npx playwright test TestCase3.spec.ts --workers=1
        env:
          PLAYWRIGHT_HTML_REPORT: reports/test3

      # =====================
      # UPLOAD REPORTS
      # =====================
      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: reports/
          retention-days: 30