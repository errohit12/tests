name: Playwright Tests

on:
  push: {}
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Show Node/npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Test Case 1 - Run 1 time
      - name: Run TestCase1 once
        run: npx playwright test tests/TestCase1.spec.ts --repeat-each=1 --workers=1

      # Test Case 2 - Run 5 times
      - name: Run TestCase2 five times
        run: npx playwright test tests/TestCase2.spec.ts --repeat-each=5 --workers=1

      # Test Case 3 - Run 1 time
      - name: Run TestCase3 once
        run: npx playwright test tests/TestCase3.spec.ts --repeat-each=1 --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
