name: Playwright Tests
on:
  push: {}
  pull_request: {}
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Show Node/npm versions
        run: node -v && npm -v

      - name: Debug info (runner)
        run: |
          echo "=== Runner info ==="
          uname -a || true
          echo "PWD: $(pwd)"
          echo "Branch:" && git rev-parse --abbrev-ref HEAD || true
          echo "Git status:" && git --no-pager status --porcelain || true
          echo "Files:" && ls -la || true

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run TestCase1
        run: npx playwright test TestCase1.spec.ts --workers=1 --reporter=html --output=reports/test1

      - name: Run TestCase2 (5 times)
        run: npx playwright test TestCase2.spec.ts --repeat-each=5 --workers=1 --reporter=html --output=reports/test2

      - name: Run TestCase3
        run: npx playwright test TestCase3.spec.ts --workers=1 --reporter=html --output=reports/test3

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30