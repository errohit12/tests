name: Playwright Tests

on:
  push: {}
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run TestCase1 once
        run: npx playwright test --grep "Test case 1" --workers=1

      - name: Run TestCase2 five times
        run: npx playwright test --grep "Test case 2" --repeat-each=5 --workers=1

      - name: Run TestCase3 once
        run: npx playwright test --grep "Test case 3" --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
